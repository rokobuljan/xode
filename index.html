    <nav id="top">
        <h1 class="logo"><b>◆</b>Xode</h1>
        <input type="text" id="projectTitle" placeholder="Project title">
        <button id="download" type="button" title="Download">

                viewBox="131 -131 512 512">
                <path fill="currentColor"

            </svg>
        </button>
        <label class="ckbtn"><input type="checkbox" checked data-view-toggle="html"><span>HTML</span></label>
        <label class="ckbtn"><input type="checkbox" checked data-view-toggle="css"><span>CSS</span></label>
        <label class="ckbtn"><input type="checkbox" checked data-view-toggle="js"><span>JS</span></label>
        <label class="ckbtn"><input type="checkbox" checked data-view-toggle="console"><span>›_</span></label>

        <button id="run" type="button" title="Run Xode">Run ▶</button>
    </nav>
